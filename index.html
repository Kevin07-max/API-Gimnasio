<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sistema Gimnasio</title>

    <style>
        body{
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            margin: 0;
            color: #333;
        }

        .container{
            width: 95%;
            max-width: 1100px;
            margin: 40px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
        }

        .tabs{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tabs button{
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            background: #2c5364;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .tabs button:hover{
            background: #1e90ff;
            transform: scale(1.05);
        }

        #formulario{
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        input, select{
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 180px;
            transition: 0.2s;
        }

        input:focus, select:focus{
            outline: none;
            border-color: #1e90ff;
            box-shadow: 0 0 5px #1e90ff;
        }

        .acciones{
            text-align: center;
            margin-bottom: 15px;
        }

        button{
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .crear{
            background: #28a745;
            color: white;
        }

        .crear:hover{
            background: #218838;
        }

        .actualizar{
            background: #ffc107;
            color: black;
        }

        .actualizar:hover{
            background: #e0a800;
        }

        .eliminar{
            background: #dc3545;
            color: white;
        }

        .eliminar:hover{
            background: #c82333;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 10px;
        }

        th{
            background: #2c5364;
            color: white;
            padding: 10px;
        }

        td{
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover{
            background: #f1f1f1;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🏋️ Sistema Gimnasio</h1>

    <div class="tabs">
        <button onclick="cambiar('clientes')">Clientes</button>
        <button onclick="cambiar('gimnasios')">Gimnasios</button>
        <button onclick="cambiar('paquetes')">Paquetes</button>
        <button onclick="cambiar('entradas')">Entradas</button>
    </div>

    <div id="formulario"></div>

    <div class="acciones">
        <button class="crear" onclick="crear()">Crear</button>
        <button class="actualizar" onclick="actualizar()">Actualizar</button>
    </div>

    <table>
        <thead id="thead"></thead>
        <tbody id="tabla"></tbody>
    </table>

</div>

<script src="app-Frontend.js"></script>

</body>
</html>
